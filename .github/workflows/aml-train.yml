name: Azure ML - Train

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "data-science/**"
      - "mlops/azureml/train/**"
      - ".github/workflows/aml-train.yml"

permissions:
  id-token: write
  contents: read

jobs:
  train:
    runs-on: ubuntu-latest

    env:
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZUREML_WORKSPACE: ${{ secrets.AZUREML_WORKSPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure ML CLI v2
        run: |
          az extension add -n ml -y
          az version
          az extension show -n ml

      - name: Set default workspace
        run: |
          az configure --defaults group="${AZURE_RESOURCE_GROUP}" workspace="${AZUREML_WORKSPACE}"

      - name: Submit training job
        run: |
          az ml job create --file mlops/azureml/train/train.yml --stream
