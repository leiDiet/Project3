name: Azure ML - Train
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
    paths:
      - "data-science/**"
      - "mlops/azureml/train/**"
      - ".github/workflows/aml-train.yml"
jobs:
  train:
    runs-on: ubuntu-latest
    env:
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZUREML_WORKSPACE: ${{ secrets.AZUREML_WORKSPACE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Install Azure ML CLI v2
        run: |
          az extension add -n ml -y
          az version
          az extension show -n ml
      - name: Set default workspace
        run: |
          az configure --defaults group="${AZURE_RESOURCE_GROUP}" workspace="${AZUREML_WORKSPACE}"
      - name: Submit training job
        run: |
          az ml job create \
            --file mlops/azureml/train/train.yml \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.AZUREML_WORKSPACE }} \
            --stream

      - name: Set default workspace
        run: |
          az configure --defaults group="${AZURE_RESOURCE_GROUP}" workspace="${AZUREML_WORKSPACE}"

     - name: Submit training job
        run: |
          az ml job create \
            --file mlops/azureml/train/train.yml \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --workspace-name ${{ secrets.AZUREML_WORKSPACE }} \
            --stream
