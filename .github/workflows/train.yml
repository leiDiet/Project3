name: AzureML Train Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Install Azure ML CLI
        run: |
          az extension add -n ml -y
          az extension update -n ml

      - name: Submit AML training job
        run: |
          az ml job create \
            --file mlops/azureml/train/train-job.yml \
            -g GL_oct_25 \
            -w GL_oct_25
